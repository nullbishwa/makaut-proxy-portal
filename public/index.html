<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Examination System - MAKAUT Proxy</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f5; margin: 0; padding: 40px; }
        .box { max-width: 450px; background: white; margin: auto; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { color: #004080; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #004080; color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background: #00264d; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Student Login Portal</h2>
        <form action="/smartexam/public/student-login" method="POST">
            <div class="form-group">
                <label>User Name:</label>
                <input type="text" name="username" placeholder="Enter Roll Number" required>
            </div>
            <div class="form-group">
                <label>Password:</label>
                <input type="password" name="password" placeholder="Enter Password / DOB" required>
            </div>
            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
